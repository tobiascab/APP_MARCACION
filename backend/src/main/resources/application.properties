# =====================================
# RELOJ REDUCTO - Configuración
# =====================================

# Nombre de la aplicación
spring.application.name=RelojReducto

# =====================================
# Configuración del Servidor
# =====================================
server.port=8080
server.address=0.0.0.0

# Configuración HTTPS comentada para usar HTTP interno estable
# server.ssl.key-store=classpath:RELOJREDUCTO.p12
# server.ssl.key-store-password=RelojReducto2024
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=RELOJREDUCTO

# =====================================
# Configuración de MySQL
# =====================================
spring.datasource.url=jdbc:mysql://localhost:3306/reloj_reducto_db?useSSL=false&serverTimezone=America/Asuncion&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================
# Configuración de JPA / Hibernate
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================
# Configuración JWT
# =====================================
jwt.secret=${JWT_SECRET:RelojReducto_X9k2m5v8pR3wQ7nT1bY6cF4hJ0sA8dG2eL5iO9uW3xZ6vN1mK4jP7qR0tB5yH2gU8fE3aI6oC9wM1nS4lD7xV0zJ2kQ5pT8bY3cF6hA9dG1eL4iO7uW0xZ3vN6mK9jP2qR5tB8yH1gU4fE7aI0oC3wM6nS9lD2xV5zJ8kQ1p}
jwt.expiration=86400000

# =====================================
# Configuración de CORS (para el Frontend)
# Permitir cualquier origen para acceso desde red local
# =====================================
cors.allowed-origins=https://asistoreducto.arizar-ia.cloud

# =====================================
# Logging (WARN en producción)
# =====================================
logging.level.org.springframework.security=WARN
logging.level.com.relojreducto=INFO
server.forward-headers-strategy=native

# =====================================
# Seguridad Adicional
# =====================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
spring.jackson.serialization.fail-on-empty-beans=false
