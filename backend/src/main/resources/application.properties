# =====================================
# RELOJ REDUCTO - Configuración
# =====================================

# Nombre de la aplicación
spring.application.name=RelojReducto

# =====================================
# Configuración del Servidor
# =====================================
server.port=8443
server.address=0.0.0.0

# Configuración HTTPS
server.ssl.key-store=classpath:RELOJREDUCTO.p12
server.ssl.key-store-password=RelojReducto2024
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=RELOJREDUCTO

# =====================================
# Configuración de MySQL
# =====================================
spring.datasource.url=jdbc:mysql://localhost:3306/reloj_reducto_db?useSSL=false&serverTimezone=America/Asuncion&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================
# Configuración de JPA / Hibernate
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================
# Configuración JWT
# =====================================
jwt.secret=RelojReductoSecretKey2024SuperSeguraConMasde256bitsParaHS512
jwt.expiration=86400000

# =====================================
# Configuración de CORS (para el Frontend)
# Permitir cualquier origen para acceso desde red local
# =====================================
cors.allowed-origins=*

# =====================================
# Logging
# =====================================
logging.level.org.springframework.security=DEBUG
logging.level.com.relojreducto=DEBUG
