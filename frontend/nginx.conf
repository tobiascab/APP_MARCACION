server {
    listen 80;
    server_name asistoreducto.arizar-ia.cloud;

    root /usr/share/nginx/html;
    index index.html;

    # Ocultar version de nginx
    server_tokens off;

    # Gzip para velocidad
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 50M;

    # ===========================================
    # BLOQUEAR ACCESO A SOURCE MAPS
    # ===========================================
    location ~* \.map$ {
        return 404;
    }

    # Proxy API hacia el backend Spring Boot
    location /api/ {
        proxy_pass http://relojreducto-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Ocultar headers del backend
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Security Headers para API
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Proxy WebSocket
    location /ws-notifications {
        proxy_pass http://relojreducto-backend:8080/ws-notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # index.html - NO cachear + headers de seguridad
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://mt1.google.com https://unpkg.com https://*.tile.openstreetmap.org; connect-src 'self' wss://asistoreducto.arizar-ia.cloud https://mt1.google.com https://router.project-osrm.org; frame-ancestors 'self';" always;
    }

    # React Router fallback + headers de seguridad
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://mt1.google.com https://unpkg.com https://*.tile.openstreetmap.org; connect-src 'self' wss://asistoreducto.arizar-ia.cloud https://mt1.google.com https://router.project-osrm.org; frame-ancestors 'self';" always;
    }

    # Service Worker - NUNCA cachear para que se actualice inmediato
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache de assets estáticos + headers de seguridad
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }
}
