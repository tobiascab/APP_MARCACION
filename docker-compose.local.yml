# ==========================================
# 🔧 Docker Compose - Modo Localhost
# Solo expone el backend para el frontend local
# NO toca los servicios de producción
# ==========================================
# Uso: docker compose -f docker-compose.yml -f docker-compose.local.yml up relojreducto-backend-local -d

services:
  # ==========================================
  # Backend Local - Expone puerto 8081 al host
  # Comparte la misma DB, solo es un proxy
  # ==========================================
  relojreducto-backend-local:
    image: nginx:alpine
    container_name: relojreducto-backend-local
    restart: "no"
    ports:
      - "8082:80"
    networks:
      - relojreducto-internal
    volumes:
      - ./nginx-local-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - relojreducto-backend
