# ==========================================
# Nginx Proxy Local - Reenvía al backend Docker
# Solo para desarrollo localhost
# ==========================================

server {
    listen 80;
    server_name localhost;

    # Proxy todo al backend Spring Boot interno
    location / {
        proxy_pass http://relojreducto-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Para uploads grandes
        client_max_body_size 50M;
    }

    # WebSocket proxy
    location /ws-notifications {
        proxy_pass http://relojreducto-backend:8080/ws-notifications;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
